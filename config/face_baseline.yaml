# Face Recognition Baseline Configuration
# Standard ArcFace with fixed margin

experiment:
  name: "face_baseline"
  description: "Baseline face verification with fixed-margin ArcFace"
  seed: 21

model:
  backbone: "resnet50"  # Options: resnet50, mobilefacenet
  embedding_dim: 512
  num_classes: 1680  # Number of unique identities in LFW dataset
  pretrained: true

arcface:
  scale: 64.0
  margin: 0.5
  adaptive: false

# Data paths used by build_face_dataloader
data:
  face_data_dir: "data/face"
  face_label_file: "data/face/labels.txt"
  image_size: 112
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  add_quality_degradation: false
  degradation_types: ["blur", "brightness"]

dataset:
  image_size: 112
  num_workers: 0

  # Augmentation settings
  augmentation:
    enabled: true
    horizontal_flip: true
    color_jitter: true

  # Synthetic degradation (disabled for baseline)
  degradation:
    enabled: false
    low_light_prob: 0.0
    blur_prob: 0.0
    occlusion_prob: 0.0

training:
  batch_size: 32
  epochs: 50
  num_workers: 0
  optimizer: "sgd"
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  gradient_clip: 20.0

  scheduler:
    type: "cosine"
    T_max: 50
    eta_min: 0.0001

  early_stopping:
    enabled: true
    patience: 15
    monitor: "val_eer"
    mode: "min"

evaluation:
  verification_pairs: 6000
  thresholds: 100

logging:
  log_interval: 100
  save_best_only: true
  tensorboard: false
  wandb: false

results:
  dir: "results/face/baseline"
  save_embeddings: true
  save_roc_data: true
